name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained
        run: >
          dotnet publish src/ASPAssistant.App/ASPAssistant.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish/win-x64

      - name: Zip release assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive `
            -Path publish/win-x64 `
            -DestinationPath "publish/ASPAssistant-${version}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ASPAssistant-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true

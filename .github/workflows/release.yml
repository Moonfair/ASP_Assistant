name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish self-contained
        run: >
          dotnet publish src/ASPAssistant.App/ASPAssistant.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ env.VERSION }}
          -o publish/win-x64

      - name: Zip release assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive `
            -Path publish/win-x64 `
            -DestinationPath "publish/ASPAssistant-${version}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ASPAssistant-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true

      - name: Setup ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload to Aliyun OSS
        run: >
          ossutil cp
          publish/ASPAssistant-${{ github.ref_name }}-win-x64.zip
          oss://${{ secrets.OSS_BUCKET }}/releases/ASPAssistant-${{ github.ref_name }}-win-x64.zip
          --force

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish src/ASPAssistant.App/ASPAssistant.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=${{ env.VERSION }} `
            -p:PublishSingleFile=true `
            -o publish/win-x64

      - name: Trim publish output
        shell: pwsh
        run: |
          $out = "publish/win-x64"
          # Remove debug symbols
          Remove-Item "$out\*.pdb" -ErrorAction SilentlyContinue
          # Remove non-Windows runtimes bundled by MaaFramework NuGet
          Get-ChildItem "$out\runtimes" -Directory |
            Where-Object { $_.Name -ne "win-x64" } |
            ForEach-Object { Remove-Item $_.FullName -Recurse -Force }

      - name: Zip release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish/win-x64/* `
            -DestinationPath "publish/ASPAssistant-${tag}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ASPAssistant-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true

      - name: Setup ossutil
        uses: yizhoumo/setup-ossutil@v2
        with:
          ossutil-version: latest
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Upload to Aliyun OSS
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          ossutil cp "publish/ASPAssistant-${tag}-win-x64.zip" `
            "oss://${{ secrets.OSS_BUCKET }}/releases/ASPAssistant-${tag}-win-x64.zip" `
            --force

      - name: Update Pages OSS release info
        shell: pwsh
        run: |
          $tag    = "${{ github.ref_name }}"
          $ossUrl = "https://${{ secrets.OSS_BUCKET }}.${{ secrets.OSS_ENDPOINT }}/releases/ASPAssistant-${tag}-win-x64.zip"
          $json   = [ordered]@{ version = $tag; url = $ossUrl } | ConvertTo-Json -Compress
          git fetch origin main
          git checkout main
          [System.IO.File]::WriteAllText("docs/oss-release.json", $json, [System.Text.Encoding]::UTF8)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/oss-release.json
          git diff --cached --quiet || git commit -m "chore: update OSS release info for ${tag}"
          git push origin main
